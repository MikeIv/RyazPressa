# Ryazpressa Platform — CI/CD (GitLab)
# Артефакт: .output/public/ после pnpm generate (static SPA)
# См. docs/deployment-static-spa.md и docs/optimization-plan.md

image: node:22-bookworm

variables:
  PNPM_VERSION: '11.1.1'
  NUXT_PUBLIC_API_BASE: 'https://api.ryazpressa.ru'
  PNPM_STORE_PATH: .pnpm-store

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store

stages:
  - test
  - build

.default_setup: &default_setup
  before_script:
    - corepack enable
    - corepack prepare pnpm@${PNPM_VERSION} --activate
    - pnpm config set store-dir ${PNPM_STORE_PATH}
    - pnpm install --frozen-lockfile

lint:
  <<: *default_setup
  stage: test
  script:
    - pnpm lint:all
    - pnpm exec nuxi typecheck
    - pnpm test

generate:
  <<: *default_setup
  stage: build
  needs:
    - lint
  script:
    - pnpm generate
  artifacts:
    name: static-spa-${CI_COMMIT_SHORT_SHA}
    paths:
      - .output/public/
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH
